<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TG MTProto 管理后台{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; }
    .sidebar {
      width: 220px; min-height: 100vh;
      background: #1a1d23;
      position: fixed; top: 0; left: 0;
      padding-top: 1rem; z-index: 100;
    }
    .sidebar .brand {
      color: #fff; font-size: 1.1rem; font-weight: 700;
      padding: .75rem 1.25rem 1.25rem;
      border-bottom: 1px solid #2d3139;
      display: flex; align-items: center; gap: .5rem;
    }
    .sidebar .nav-label {
      color: #4b5563; font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      padding: .75rem 1.25rem .25rem;
    }
    .sidebar .nav-link {
      color: #9aa0ac; padding: .6rem 1.25rem;
      font-size: .9rem; display: flex; align-items: center;
      gap: .6rem; transition: all .15s;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active { color: #fff; background: #2d3139; }
    .sidebar .nav-link i { font-size: 1rem; }
    .main-content { margin-left: 220px; padding: 1.5rem 2rem; }
    .page-header { margin-bottom: 1.5rem; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .stat-card { border-radius: 12px; }
    .stat-card .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .badge-active   { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-error    { background: #fee2e2; color: #991b1b; }
    table th {
      font-weight: 600; font-size: .85rem; color: #6b7280;
      text-transform: uppercase; letter-spacing: .03em;
    }
    .btn-icon {
      width: 32px; height: 32px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="brand">
    <i class="bi bi-telegram text-primary"></i> TG Admin
  </div>
  <ul class="nav flex-column mt-1">
    <li class="nav-label">主菜单</li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
        <i class="bi bi-grid-1x2"></i> 概览
      </a>
    </li>
    <li class="nav-label">管理</li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path.startswith('/channels') %}active{% endif %}" href="/channels">
        <i class="bi bi-diagram-3"></i> 渠道
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path.startswith('/accounts') %}active{% endif %}" href="/accounts">
        <i class="bi bi-person-badge"></i> 账号
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path.startswith('/groups') %}active{% endif %}" href="/groups">
        <i class="bi bi-chat-dots"></i> 监控群组
      </a>
    </li>
  </ul>
</nav>

<div class="main-content">
  {% if msg %}
  <div class="alert alert-{{ msg_type }} alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
